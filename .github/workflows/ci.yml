name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - security-hardening-v2

permissions:
  contents: read

jobs:
  test:
    name: Typecheck, test, build, audit, pack
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Audit dependencies
        run: npm run audit:security

      - name: Pack dry-run
        run: npm run pack:dry-run
